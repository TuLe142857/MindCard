services:
  frontend:
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend/:/app/
      - /app/node_modules
    ports:
      - "${FRONTEND_PORT_EXTERNAL:-5173}:5173"

  # backend:
  #   build:
  #     context: ./backend
  #   ports:
  #     - "${BACKEND_PORT_EXTERNAL:-8080}:8080"
    
  db:
    volumes:
      - db_data_dev:/var/lib/postgresql/18/docker

  s3:
    volumes:
      - s3_data_dev:/data

volumes:
  db_data_dev:
  s3_data_dev: